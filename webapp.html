<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WordQuest | Emma Hardy</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #121213;
      --panel: #1a1a1b;
      --tile-border: #3a3a3c;
      --filled-border: #565758;
      --correct: #538d4e;
      --present: #b59f3b;
      --absent: #3a3a3c;
      --text: #ffffff;
      --subtext: #b7b7b7;
      --key-bg: #818384;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1rem;
    }

    header {
      width: 100%;
      max-width: 520px;
      text-align: center;
      border-bottom: 1px solid #2b2b2c;
      padding-bottom: 1rem;
      margin-bottom: 1rem;
    }

    h1 {
      font-family: 'Bebas Neue', sans-serif;
      letter-spacing: 4px;
      font-size: 2.4rem;
    }

    .subtitle {
      color: var(--subtext);
      font-size: 0.9rem;
      margin-top: 0.25rem;
    }

    .back-link {
      display: inline-block;
      margin-top: 0.5rem;
      color: var(--subtext);
      text-decoration: none;
      font-size: 0.85rem;
    }

    .back-link:hover {
      color: white;
    }

    #message {
      min-height: 28px;
      margin: 0.75rem 0 0.5rem;
      font-weight: 700;
      text-align: center;
      font-size: 0.95rem;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(5, 62px);
      grid-template-rows: repeat(6, 62px);
      gap: 5px;
      margin: 0.5rem 0 1rem;
    }

    .tile {
      width: 62px;
      height: 62px;
      border: 2px solid var(--tile-border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      font-weight: 700;
      text-transform: uppercase;
      user-select: none;
      transition: transform 0.12s ease, background-color 0.2s ease, border-color 0.2s ease;
    }

    .tile.filled {
      border-color: var(--filled-border);
    }

    .tile.correct {
      background-color: var(--correct);
      border-color: var(--correct);
    }

    .tile.present {
      background-color: var(--present);
      border-color: var(--present);
    }

    .tile.absent {
      background-color: var(--absent);
      border-color: var(--absent);
    }

    .tile.pop {
      transform: scale(1.08);
    }

    .controls {
      display: flex;
      gap: 0.75rem;
      margin-bottom: 1rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .btn {
      border: none;
      border-radius: 6px;
      padding: 0.7rem 1rem;
      font-weight: 700;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
    }

    .btn-new {
      background: var(--correct);
      color: white;
    }

    .btn-hint {
      background: var(--present);
      color: #111;
    }

    .btn:hover {
      filter: brightness(1.08);
    }

    #keyboard {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-top: 0.5rem;
    }

    .key-row {
      display: flex;
      justify-content: center;
      gap: 6px;
    }

    .key {
      min-width: 43px;
      height: 58px;
      border: none;
      border-radius: 4px;
      background: var(--key-bg);
      color: white;
      font-weight: 700;
      cursor: pointer;
      padding: 0 8px;
      text-transform: uppercase;
    }

    .key.wide {
      min-width: 66px;
      font-size: 0.78rem;
    }

    .key.correct {
      background: var(--correct);
    }

    .key.present {
      background: var(--present);
      color: #111;
    }

    .key.absent {
      background: var(--absent);
    }

    .instructions {
      max-width: 520px;
      margin-top: 1rem;
      color: var(--subtext);
      font-size: 0.9rem;
      line-height: 1.6;
      background: var(--panel);
      padding: 1rem;
      border-radius: 10px;
    }

    @media (max-width: 500px) {
      #board {
        grid-template-columns: repeat(5, 52px);
        grid-template-rows: repeat(6, 52px);
      }

      .tile {
        width: 52px;
        height: 52px;
        font-size: 1.7rem;
      }

      .key {
        min-width: 32px;
        height: 50px;
        font-size: 0.8rem;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>WordQuest</h1>
    <p class="subtitle">A Wordle-style 5-letter word game</p>
    <a class="back-link" href="scratch.html">← Back to Hiking Page</a>
  </header>

  <div id="message"></div>
  <div id="board"></div>

  <div class="controls">
    <button class="btn btn-new" onclick="newGame()">New Game</button>
    <button class="btn btn-hint" onclick="showHint()">Hint</button>
  </div>

  <div id="keyboard"></div>

  <div class="instructions">
    Guess the 5-letter word in 6 tries. Green means correct spot, yellow means the letter is in the word but in the wrong spot, and gray means the letter is not in the word.
  </div>

  <script>
    const WORDS = [
      "TRAIL","RIVER","STONE","PEAKS","MOUNT","PLANT","CLOUD","WATER","HIKER","RIDGE",
      "BRUSH","EARTH","FOREST","MOOSE","PINES","CREEK","CLIFF","BLOOM","FLAME","SHELL",
      "SUNNY","STORM","NORTH","SOUTH","GLADE","FIELD","HOUSE","GROVE","ASPEN","FAITH",
      "SMILE","BRAVE","LIGHT","SWEET","HEART","DREAM","QUEST","GRACE","LAKES","ROBIN",
      "EAGLE","SNOWY","FROST","TOWER","BERRY","SLOPE","CROWN","SHINE","CAMPS","RANCH"
    ];

    const VALID_WORDS = new Set([
      ...WORDS,
      "ABOUT","ABOVE","ADORE","AFTER","AGREE","ALONE","ANGEL","APPLE","BEACH","BRAIN",
      "BRICK","BRING","BROWN","CHAIR","CHEER","CHESS","CLEAR","CLOSE","COAST","DANCE",
      "DELTA","EARTH","ENJOY","FIELD","FLOOR","FOCUS","FRAME","FRESH","FRONT","GHOST",
      "GIANT","GLASS","GRASS","GREEN","GROUP","GUIDE","HAPPY","HONEY","HORSE","HOUSE",
      "IDEAL","JUICE","KNIFE","LEMON","LEVEL","LIGHT","LUNCH","MAGIC","MAPLE","METAL",
      "MIGHT","MONEY","MUSIC","NIGHT","OCEAN","PAINT","PARTY","PEACE","PHONE","PIANO",
      "PLACE","PLANE","PLANT","POWER","PRIDE","QUEEN","QUIET","RADIO","RAISE","REACH",
      "RELAX","RIGHT","ROUND","SCALE","SCENE","SHARE","SHINE","SHIRT","SHORE","SKILL",
      "SLEEP","SMALL","SMART","SOUND","SPACE","SPEED","SPEND","SPICE","SPORT","STAND",
      "START","STORY","STYLE","SUGAR","TABLE","TEACH","THANK","THEME","THINK","THREE",
      "TIGER","TODAY","TOUCH","TOWER","TRACK","TRAIN","TRUST","UNITY","VALUE","VOICE",
      "WATCH","WHITE","WORLD","YOUTH","ZEBRA"
    ]);

    const ROWS = 6;
    const COLS = 5;

    let targetWord = "";
    let currentRow = 0;
    let currentCol = 0;
    let currentGuess = [];
    let gameOver = false;

    const keyPriority = { absent: 1, present: 2, correct: 3 };
    const keyStates = {};

    const keyboardRows = [
      ["Q","W","E","R","T","Y","U","I","O","P"],
      ["A","S","D","F","G","H","J","K","L"],
      ["ENTER","Z","X","C","V","B","N","M","⌫"]
    ];

    const hintMap = {
      TRAIL: "You would find this on a hike.",
      RIVER: "It flows through nature.",
      STONE: "A small piece of the mountain.",
      PEAKS: "The highest parts of mountains.",
      MOUNT: "A high place to climb.",
      PLANT: "Something green and growing.",
      CLOUD: "It floats in the sky.",
      WATER: "You always need this to hike.",
      HIKER: "A person on the trail.",
      RIDGE: "A long narrow mountain top.",
      FOREST: "A place full of trees.",
      CREEK: "A small flowing stream.",
      CLIFF: "A steep rock face.",
      ASPEN: "A tree common in Utah mountains.",
      LAKES: "Still water in the mountains.",
      EAGLE: "A powerful bird.",
      SNOWY: "How mountaintops often look.",
      SLOPE: "An angled side of a mountain.",
      QUEST: "An adventurous journey."
    };

    function buildBoard() {
      const board = document.getElementById("board");
      board.innerHTML = "";
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          const tile = document.createElement("div");
          tile.className = "tile";
          tile.id = `tile-${r}-${c}`;
          board.appendChild(tile);
        }
      }
    }

    function buildKeyboard() {
      const keyboard = document.getElementById("keyboard");
      keyboard.innerHTML = "";

      keyboardRows.forEach(row => {
        const rowDiv = document.createElement("div");
        rowDiv.className = "key-row";

        row.forEach(key => {
          const btn = document.createElement("button");
          btn.className = "key";
          if (key === "ENTER" || key === "⌫") btn.classList.add("wide");
          btn.id = `key-${key}`;
          btn.textContent = key;
          btn.addEventListener("click", () => handleKey(key));
          rowDiv.appendChild(btn);
        });

        keyboard.appendChild(rowDiv);
      });
    }

    function getTile(row, col) {
      return document.getElementById(`tile-${row}-${col}`);
    }

    function showMessage(text) {
      document.getElementById("message").textContent = text;
    }

    function chooseWord() {
      return WORDS[Math.floor(Math.random() * WORDS.length)];
    }

    function handleKey(key) {
      if (gameOver) return;

      if (key === "ENTER") {
        submitGuess();
        return;
      }

      if (key === "⌫") {
        if (currentCol > 0) {
          currentCol--;
          currentGuess.pop();
          const tile = getTile(currentRow, currentCol);
          tile.textContent = "";
          tile.classList.remove("filled");
        }
        return;
      }

      if (/^[A-Z]$/.test(key) && currentCol < COLS) {
        const tile = getTile(currentRow, currentCol);
        tile.textContent = key;
        tile.classList.add("filled", "pop");
        setTimeout(() => tile.classList.remove("pop"), 100);
        currentGuess.push(key);
        currentCol++;
      }
    }

    function scoreGuess(guess, answer) {
      const result = Array(COLS).fill("absent");
      const answerLetters = answer.split("");
      const guessLetters = guess.split("");

      for (let i = 0; i < COLS; i++) {
        if (guessLetters[i] === answerLetters[i]) {
          result[i] = "correct";
          answerLetters[i] = null;
          guessLetters[i] = null;
        }
      }

      for (let i = 0; i < COLS; i++) {
        if (guessLetters[i] && answerLetters.includes(guessLetters[i])) {
          result[i] = "present";
          answerLetters[answerLetters.indexOf(guessLetters[i])] = null;
        }
      }

      return result;
    }

    function updateKeyboard(letter, state) {
      const current = keyStates[letter];
      if (!current || keyPriority[state] > keyPriority[current]) {
        keyStates[letter] = state;
        const key = document.getElementById(`key-${letter}`);
        if (key) {
          key.classList.remove("correct", "present", "absent");
          key.classList.add(state);
        }
      }
    }

    function submitGuess() {
      if (currentCol < COLS) {
        showMessage("Not enough letters");
        return;
      }

      const guess = currentGuess.join("");

      if (!VALID_WORDS.has(guess)) {
        showMessage("Not a valid word");
        return;
      }

      const result = scoreGuess(guess, targetWord);

      for (let i = 0; i < COLS; i++) {
        const tile = getTile(currentRow, i);
        tile.classList.add(result[i]);
        updateKeyboard(guess[i], result[i]);
      }

      if (guess === targetWord) {
        showMessage("You got it!");
        gameOver = true;
        return;
      }

      currentRow++;
      currentCol = 0;
      currentGuess = [];

      if (currentRow === ROWS) {
        showMessage(`Game over — the word was ${targetWord}`);
        gameOver = true;
      } else {
        showMessage("");
      }
    }

    function showHint() {
      if (!targetWord || gameOver) return;
      const hint = hintMap[targetWord] || `The word starts with ${targetWord[0]}.`;
      showMessage(`Hint: ${hint}`);
    }

    function newGame() {
      targetWord = chooseWord();
      currentRow = 0;
      currentCol = 0;
      currentGuess = [];
      gameOver = false;

      for (const key in keyStates) delete keyStates[key];

      buildBoard();
      buildKeyboard();
      showMessage("New game started");
    }

    document.addEventListener("keydown", (e) => {
      if (gameOver) return;

      if (e.key === "Enter") {
        handleKey("ENTER");
      } else if (e.key === "Backspace") {
        handleKey("⌫");
      } else if (/^[a-zA-Z]$/.test(e.key)) {
        handleKey(e.key.toUpperCase());
      }
    });

    newGame();
  </script>
</body>
</html>
